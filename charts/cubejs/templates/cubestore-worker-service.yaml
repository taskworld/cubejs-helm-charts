apiVersion: v1
kind: Service
metadata:
  name: cubestore-worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.cubestoreWorker.service.service_port }}
      targetPort: {{ .Values.cubestoreWorker.service.port }}
      protocol: TCP
      name: tcp-worker
  selector:
    cubejsApp: cubestoreWorker
