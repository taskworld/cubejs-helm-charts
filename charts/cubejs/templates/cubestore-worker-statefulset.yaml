apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cubestore-worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: cubestore-worker
  {{- if .Values.annotations }}
  annotations:
    {{- toYaml .Values.annotations | nindent 4 }}
  {{- end }}
spec:
  serviceName: cubestore-worker
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.cubestoreWorker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      cubejsApp: cubestoreWorker
      {{- include "chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.annotations | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        cubejsApp: cubestoreWorker
        app.kubernetes.io/component: cubestore-worker
        {{- include "chart.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chart.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-router
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: ['sh', '-c', 'until nc -vz cubestore-router:9999; do echo "Waiting for router"; sleep 2; done;']
      containers:
        - name: {{ .Chart.Name }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CUBESTORE_SERVER_NAME
              value: "$(POD_NAME).cubestore-worker:{{ .Values.cubestoreWorker.service.port }}"
            - name: CUBESTORE_WORKERS
              value: {{ include "chart.cubestoreWorkers" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Values.cubestoreWorker.configmap.name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.cubestoreWorker.image }}"
          imagePullPolicy: {{ .Values.cubestoreWorker.pullPolicy }}
          ports:
            - name: tcp-worker
              containerPort: {{ .Values.cubestoreWorker.service.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: {{ .Values.cubestoreWorker.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: {{ .Values.cubestoreWorker.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: cubestore-data
              mountPath: /cube/.cubestore/data
          resources:
            {{- toYaml .Values.cubestoreWorker.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: cubestore-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.cubestoreWorker.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.cubestoreWorker.persistence.size | quote }}
