{{- if .Values.istio.enabled }}
# Allow cube-api to reach BigQuery APIs.
# Required when meshConfig.outboundTrafficPolicy is REGISTRY_ONLY; harmless with ALLOW_ANY.
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: google-bigquery
  namespace: {{ .Values.namespace }}
spec:
  hosts:
    - bigquery.googleapis.com
    - bigquerystorage.googleapis.com
    - oauth2.googleapis.com
    - accounts.google.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS
---
# Allow cubestore-router and cubestore-worker to reach S3 for pre-aggregation storage.
# Also covers STS for IRSA token exchange (AssumeRoleWithWebIdentity).
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: aws-s3
  namespace: {{ .Values.namespace }}
spec:
  hosts:
    - s3.amazonaws.com
    - "*.s3.amazonaws.com"
    - s3.{{ .Values.cubestore.s3.region }}.amazonaws.com
    - "*.s3.{{ .Values.cubestore.s3.region }}.amazonaws.com"
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: aws-sts
  namespace: {{ .Values.namespace }}
spec:
  hosts:
    - sts.amazonaws.com
    - sts.{{ .Values.cubestore.s3.region }}.amazonaws.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS
{{- end }}
